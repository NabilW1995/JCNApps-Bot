services:
  bot:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://bot:bot@postgres:5432/jcnapps_bot
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - PASSCRAFT_BUGS_WEBHOOK_URL=${PASSCRAFT_BUGS_WEBHOOK_URL}
      - PASSCRAFT_ACTIVE_CHANNEL_ID=${PASSCRAFT_ACTIVE_CHANNEL_ID}
      - PASSCRAFT_PREVIEW_WEBHOOK_URL=${PASSCRAFT_PREVIEW_WEBHOOK_URL}
      - PASSCRAFT_DEPLOY_WEBHOOK_URL=${PASSCRAFT_DEPLOY_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: jcnapps_bot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d jcnapps_bot"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
